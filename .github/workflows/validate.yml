name: Validate Plugins

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate marketplace.json
        run: |
          if ! command -v jq &> /dev/null; then
            echo "Installing jq..."
            sudo apt-get update && sudo apt-get install -y jq
          fi
          echo "Validating marketplace.json..."
          jq empty .claude-plugin/marketplace.json
          echo "marketplace.json is valid JSON"

      - name: Check plugin.json files exist
        run: |
          echo "Checking plugin manifests..."
          for plugin in plugins/*/; do
            if [ -d "$plugin" ]; then
              plugin_json="$plugin/.claude-plugin/plugin.json"
              if [ -f "$plugin_json" ]; then
                echo "✓ Found: $plugin_json"
                jq empty "$plugin_json" || echo "✗ Invalid JSON: $plugin_json"
              else
                echo "✗ Missing: $plugin_json"
                exit 1
              fi
            fi
          done

      - name: Validate command/skill frontmatter
        run: |
          echo "Validating YAML frontmatter..."
          find plugins -name "*.md" -type f | while read file; do
            if grep -q "^---" "$file"; then
              echo "✓ $file has frontmatter"
            else
              echo "⚠ $file missing frontmatter (may be intentional)"
            fi
          done

      - name: Check required files
        run: |
          echo "Checking required files..."
          test -f .claude-plugin/marketplace.json || { echo "Missing marketplace.json"; exit 1; }
          test -f README.md || { echo "Missing README.md"; exit 1; }
          test -f LICENSE || { echo "Missing LICENSE"; exit 1; }
          test -f docs/contributing.md || { echo "Missing contributing.md"; exit 1; }
          echo "✓ All required files present"

      - name: Validate plugin names are kebab-case
        run: |
          echo "Validating plugin naming..."
          jq -r '.plugins[].name' .claude-plugin/marketplace.json | while read name; do
            if echo "$name" | grep -qE '^[a-z0-9]+(-[a-z0-9]+)*$'; then
              echo "✓ $name is kebab-case"
            else
              echo "✗ $name is not kebab-case"
              exit 1
            fi
          done

      - name: Summary
        run: |
          echo "==================================="
          echo "Validation Complete!"
          echo "==================================="
          echo "Marketplace: etopro-plugins"
          echo "Plugins found: $(jq -r '.plugins | length' .claude-plugin/marketplace.json)"
          echo "Plugin list:"
          jq -r '.plugins[].name' .claude-plugin/marketplace.json | while read name; do
            echo "  - $name"
          done
